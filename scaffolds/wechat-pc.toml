id          = "wechat-pc"
name        = "WeChat (PC)"
homepage    = "https://weixin.qq.com/"
risk        = "low"
disclaimer  = "Removes WeChat caches and (optionally) old received media. Chat history (db_storage, all_users/sqlite), account state (config / login / All Users / XPlugin), favorites (business/favorite) and Moments (business/sns) are never touched. Files go to the Recycle Bin. Old chats may show 'image/voice expired' for items beyond your chosen retention window."

# Data roots: 4.x uses xwechat_files; 3.x uses WeChat Files. Either may be relocated to other drives.
# Roaming app dir: 4.x is xwechat; 3.x is WeChat. Both detected.
detect = [
  "%USERPROFILE%/Documents/xwechat_files",
  "%USERPROFILE%/Documents/WeChat Files",
  "%APPDATA%/Tencent/xwechat",
  "%APPDATA%/Tencent/WeChat",
  "**/xwechat_files",
  "**/WeChat Files",
]

# Matcher fallback for users who relocated WeChat data off the default path.
# `name_contains` only takes long unambiguous fragments — bare "WeChat" /
# "xwechat" used to false-positive on directories like
# `WPS Office/.../uploadwechatfile` and `Weixin/<v>/WeChatPlayer.bin`.
# `must_have_child = ["all_users"]` further requires the directory to look
# like a real WeChat data root: both 4.x (`all_users`) and 3.x (`All Users`,
# resolved case-insensitively on Windows NTFS) have this subfolder; install
# directories and apps with "wechat" in their name do not.
[match]
name_contains   = ["xwechat_files", "WeChat Files"]
must_have_child = ["all_users"]

# ============================================================================
# WeChat 4.x scopes (Weixin.exe, xwechat_files/...)
# ============================================================================

[[scope]]
id       = "chat-media-cache"
label    = "聊天媒体缓存"
glob     = "**/xwechat_files/wxid_*/cache/*/Message/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "web-resource-cache"
label    = "网页 / 小程序缓存"
glob     = "**/xwechat_files/wxid_*/cache/*/{HttpResource,WeAppIcon}/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

[[scope]]
id       = "sticker-cache"
label    = "表情缓存"
glob     = "**/xwechat_files/wxid_*/{cache/*/Emoticon,business/emoticon}/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "temp-files"
label    = "临时文件"
glob     = "**/xwechat_files/wxid_*/temp/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

[[scope]]
id       = "avatar-cache"
label    = "头像缓存"
glob     = "**/xwechat_files/all_users/head_imgs/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

[[scope]]
id       = "apm-records"
label    = "性能与统计记录"
glob     = "**/xwechat_files/wxid_*/apm_record/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

[[scope]]
id       = "received-files"
label    = "接收的文件"
glob     = "**/xwechat_files/wxid_*/msg/file/**"
mode     = "recycle"
category = "media"
variant  = "4.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

# 4.x 实测：图片和视频混在同一棵 msg/video/<YYYY-MM>/ 目录下（msg/image/
# 在 4.x 不存在）。两个 scope 共享 video/ 树，按文件后缀分流；缩略图
# (_thumb.jpg) 归图片桶，高清版 (_raw.mp4) 归视频桶——纯按后缀，简单一致。
[[scope]]
id       = "received-videos"
label    = "接收的视频"
glob     = "**/xwechat_files/wxid_*/msg/video/**/*.{mp4,mov,m4v,3gp,mkv,webm,avi,m4s}"
mode     = "recycle"
category = "media"
variant  = "4.x"
prompt   = { kind = "days", default = 7, label = "保留最近多少天" }

[[scope]]
id       = "received-images"
label    = "接收的图片"
glob     = "**/xwechat_files/wxid_*/msg/video/**/*.{jpg,jpeg,png,gif,webp,bmp,heic,heif}"
mode     = "recycle"
category = "media"
variant  = "4.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "voice-attachments"
label    = "语音 / 附件"
glob     = "**/xwechat_files/wxid_*/msg/attach/**"
mode     = "recycle"
category = "media"
variant  = "4.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "chat-backups"
label    = "聊天备份"
glob     = "**/xwechat_files/Backup/wxid_*/**"
mode     = "recycle"
category = "backup"
variant  = "4.x"
prompt   = { kind = "confirm", label = "我确认要删除聊天备份" }

# ============================================================================
# Roaming app dir (4.x: %APPDATA%/Tencent/xwechat)
# ============================================================================

[[scope]]
id       = "app-logs-crashes"
label    = "应用日志与崩溃信息"
glob     = "%APPDATA%/Tencent/xwechat/{log,crashinfo}/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

[[scope]]
id       = "app-update-leftover"
label    = "安装包 / 远程配置缓存"
glob     = "%APPDATA%/Tencent/xwechat/{update,confsdk}/**"
mode     = "recycle"
category = "cache"
variant  = "4.x"
prompt   = { kind = "none" }

# ============================================================================
# WeChat 3.x legacy scopes (WeChat.exe, WeChat Files/FileStorage/...)
# Empty on 4.x machines; UI hides the whole group when 4.x is detected.
# CustomEmotion 是用户主动保存的"我的表情"，属软红线，不在任何 scope 内。
# Favorite / Favorites 是用户收藏，硬红线，不在任何 scope 内。
# Msg / MultiMsg 是聊天 DB，硬红线，不在任何 scope 内。
# ============================================================================

# 3.x 双路径：早期版本用顶层目录（Image/Image, Video, Files, Attachment），
# 后期统一搬进 FileStorage/{Image,Video,File,Cache}。两套都得扫——参见
# CleanMyWeChat 的 picCache/file/pic/video 分支：每个桶都同时匹配两种写法。
[[scope]]
id       = "image-cache-3x"
label    = "接收的图片"
glob     = "**/WeChat Files/wxid_*/{Image/Image,FileStorage/Image}/**"
mode     = "recycle"
category = "media"
variant  = "3.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "video-cache-3x"
label    = "接收的视频"
glob     = "**/WeChat Files/wxid_*/{Video,FileStorage/Video}/**"
mode     = "recycle"
category = "media"
variant  = "3.x"
prompt   = { kind = "days", default = 7, label = "保留最近多少天" }

[[scope]]
id       = "file-cache-3x"
label    = "接收的文件"
glob     = "**/WeChat Files/wxid_*/{Files,FileStorage/File}/**"
mode     = "recycle"
category = "media"
variant  = "3.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "voice-cache-3x"
label    = "语音消息"
glob     = "**/WeChat Files/wxid_*/FileStorage/{Voice2,Voice}/**"
mode     = "recycle"
category = "media"
variant  = "3.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "msg-attach-3x"
label    = "消息缩略图缓存"
glob     = "**/WeChat Files/wxid_*/FileStorage/MsgAttach/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "sticker-cache-3x"
label    = "表情包缓存"
glob     = "**/WeChat Files/wxid_*/FileStorage/{Stickers,Emotion}/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "days", default = 30, label = "保留最近多少天" }

[[scope]]
id       = "temp-files-3x"
label    = "临时文件"
glob     = "**/WeChat Files/wxid_*/FileStorage/Temp/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "none" }

[[scope]]
id       = "cache-misc-3x"
label    = "杂项缓存"
# Attachment/ 是顶层版本的图片/缩略图缓存，FileStorage/Cache/ 是统一布局后的等价物，
# CleanMyWeChat 的 picCacheCheck 分支同时清两者。
glob     = "**/WeChat Files/wxid_*/{Attachment,FileStorage/Cache}/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "none" }

# 3.x 漫游目录（%APPDATA%/Tencent/WeChat/）
[[scope]]
id       = "app-logs-crashes-3x"
label    = "应用日志与崩溃信息"
glob     = "%APPDATA%/Tencent/WeChat/{Log,Logs,CrashReport}/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "none" }

[[scope]]
id       = "app-update-leftover-3x"
label    = "安装包 / 更新缓存"
glob     = "%APPDATA%/Tencent/WeChat/Update/**"
mode     = "recycle"
category = "cache"
variant  = "3.x"
prompt   = { kind = "none" }
