name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: version
    attributes: { label: Pinkbin version, placeholder: "v0.1.1" }
    validations: { required: true }
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [Windows 11, Windows 10, macOS, Linux]
    validations: { required: true }
  - type: textarea
    id: repro
    attributes: { label: Steps to reproduce, render: markdown }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected vs actual }
    validations: { required: true }
  - type: textarea
    id: logs
    attributes: { label: Logs (~/.pinkbin/pinkbin.log), render: shell }
